spring:
  application:
    name: pawify
  datasource:
    url: jdbc:postgresql://localhost:5432/pawify-db
    username: paw-user
    password: paw-pass
  jpa:
    hibernate:
      ddl-auto: update
  jackson:
    property-naming-strategy: SNAKE_CASE
  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    username: {{email}}
    password: {{appspassword}}

security:
  jwt:
    secret-key: misuperclavesecretaaaaaajsjdskjasldjalsjdasd
    expiration-time: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /

cloudinary:
  cloud-name: {{cloudinary.cloud-name}}
  api-key: {{cloudinary.api-key}}
  api-secret: {{cloudinary.api-secret}}